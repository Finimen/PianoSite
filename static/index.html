<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 Python Piano - Make Music!</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🎹 Python Piano</h1>
        
        <!-- Registration/Login Section -->
        <div class="auth-section">
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Login</button>
                <button class="auth-tab" id="registerTab">Register</button>
            </div>
            
            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
                <h3>Welcome Back!</h3>
                <input type="text" id="loginUsername" placeholder="Username" class="auth-input">
                <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
                <button class="auth-btn" id="loginBtn">Login</button>
                <p class="auth-message" id="loginMessage"></p>
            </div>
            
            <!-- Register Form -->
            <div class="auth-form" id="registerForm">
                <h3>Join the Music!</h3>
                <input type="text" id="regUsername" placeholder="Username (3-20 chars)" class="auth-input">
                <input type="email" id="regEmail" placeholder="Email" class="auth-input">
                <input type="password" id="regPassword" placeholder="Password (min 8 chars)" class="auth-input">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" class="auth-input">
                <button class="auth-btn" id="registerBtn">Register</button>
                <p class="auth-message" id="registerMessage"></p>
            </div>
            
            <!-- User Info (shown when logged in) -->
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="welcomeUser"></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
        
        <p class="subtitle">Use your keyboard (A-K) or click the keys!</p>
        
        <div class="piano-container">
            <div class="piano">
                <!-- White keys -->
                <div class="key white" data-note="C">A</div>
                <div class="key white" data-note="D">S</div>
                <div class="key white" data-note="E">D</div>
                <div class="key white" data-note="F">F</div>
                <div class="key white" data-note="G">G</div>
                <div class="key white" data-note="A">H</div>
                <div class="key white" data-note="B">J</div>
                <div class="key white" data-note="C2">K</div>
                
                <!-- Black keys -->
                <div class="key black" data-note="C#">W</div>
                <div class="key black" data-note="D#">E</div>
                <div class="key black" data-note="F#">T</div>
                <div class="key black" data-note="G#">Y</div>
                <div class="key black" data-note="A#">U</div>
            </div>
        </div>

        <div class="controls">
            <button id="recordBtn" class="btn">⏺️ Record</button>
            <button id="playBtn" class="btn" disabled>▶️ Play</button>
            <button id="clearBtn" class="btn">🗑️ Clear</button>
            <button id="saveTrackBtn" class="btn" disabled>💾 Save to Cloud</button>
        </div>

        <div class="recordings">
            <h3>Your Melodies <span id="cloudTracksCount"></span></h3>
            <div id="tracks" class="tracks">
                <!-- Recorded tracks will appear here -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
